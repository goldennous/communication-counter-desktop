      т.д.) на дружеские (нажми, измени, сохрани, посмотри).
    priority: low
    acceptance_criteria:
      - Все глаголы в интерфейсе в дружеской форме (ты)
    depends_on: []
    related_feature: Учёт звонков и чатов
    status: completed
    summary:
