      - Карточки с закруглёнными углами
      - Все страницы и компоненты обновлены в едином стиле
    depends_on:
      - task-006
    related_feature: Учёт звонков и чатов
    status: completed
    summary:
      "Выполнен редизайн всех страниц в стиле Т-Банка: тёмная тема (#141414
      фон), жёлтый акцент (#FFDD2D) для кнопок, иконок и акцентов, крупная
      типографика (заголовки до 7xl), плавные анимации, карточки с rounded-2xl и
      свечением (tbank-glow). Обновлены app/globals.css (цвета, радиусы,
      утилиты), app/layout.tsx (шапка/подвал), app/page.tsx,
      components/{counter-page,history-page,tab-navigation}.tsx. typecheck,
      lint, build — без ошибок."
  - id: task-008
    phase: mvp
    title: Убрать уведомления о сохранении и перезагрузку страницы
    description: При нажатии + или - на странице «Счётчик» не должно быть
