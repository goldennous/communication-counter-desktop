phases:
  - id: mvp
    name: MVP
    description: Минимально жизнеспособный продукт
    order: 1
  - id: support
    name: Сопровождение
    description:
      Диагностика, ответы по коду и технические доработки без изменения
      продуктового описания
    order: 2
  - id: desktop
    name: Десктопное приложение
    description: Упаковка веб-приложения в нативное десктопное приложение через Tauri
    order: 3
tasks:
  - id: task-001
    phase: mvp
    title: Визуальная заглушка главной страницы
    description: >-
      Создать главную страницу приложения со статическими данными-заглушками.

      Цель: дать пользователю первый визуальный результат как можно быстрее.

      Реализовать только то, что пользователь увидит сразу при открытии
      приложения. Остальные страницы приложения реализовывать не нужно.
    priority: high
    acceptance_criteria:
      - Главная страница отображается без ошибок
      - Данные отображаются из статических заглушек
    depends_on: []
    related_feature: Учёт звонков и чатов
    status: completed
    summary:
      "Реализована главная страница приложения «Коммуникации» с заглушками.
      Страница содержит hero-секцию с описанием, две карточки счётчиков
      (звонки/чаты) со статическими значениями и блок итогов за неделю и месяц.
      Данные вынесены в lib/data.ts. Дизайн в стиле необанк: градиенты,
      стеклянные карточки, мягкие тени. typecheck, lint, build — без ошибок."
  - id: task-002
    phase: mvp
    title: Страница «Счётчик» с двумя счётчиками
    description:
      Реализовать страницу «Счётчик» с двумя счётчиками — для звонков и
      чатов. У каждого счётчика кнопки + и -. Значения сохраняются в DynamoDB за
      текущий день. Отображаются итоги за неделю и месяц.
    priority: high
    acceptance_criteria:
      - Счётчик звонков и чатов отображаются на одной странице
      - Кнопка + увеличивает значение на 1, кнопка - уменьшает на 1 (минимум 0)
      - Значения сохраняются в DynamoDB за текущий день
      - Отображаются итоги за текущую неделю и месяц
    depends_on:
      - task-001
    related_feature: Учёт звонков и чатов
    status: completed
    summary: Реализована страница /counter с двумя счётчиками (звонки/чаты) и
      кнопками +/—. Значения сохраняются в DynamoDB (таблица counters, ключ
      date). Отображаются итоги за неделю и месяц. Использованы zod-валидация,
      mock-данные для статического режима, sonner для уведомлений. typecheck,
      lint, build — без ошибок.
  - id: task-003
    phase: mvp
    title: Страница «История» с календарём
    description:
      Реализовать страницу «История» с календарём. Для дней, в которые
      были внесены данные, показываются значения звонков и чатов. Можно
      переключаться между месяцами.
    priority: high
    acceptance_criteria:
      - Календарь отображается на странице «История»
      - Для дней с данными показаны значения звонков и чатов
      - Можно переключаться между месяцами
    depends_on:
      - task-002
    related_feature: Просмотр истории по дням
    status: completed
    summary:
      "Реализована страница /history с календарём. Календарь отображает дни
      месяца с данными о звонках и чатах. Можно переключаться между месяцами с
      помощью кнопок навигации. Мок-данные расширены на несколько месяцев для
      наглядности. Использованы существующие API (/api/counter) для получения
      данных. Основная реализация: components/history-page.tsx,
      app/history/page.tsx. typecheck, lint, build — без ошибок."
  - id: task-004
    phase: mvp
    title: Редактирование и удаление записей из календаря
    description: Реализовать возможность редактировать или удалять запись за
      конкретный день при клике на день в календаре.
    priority: medium
    acceptance_criteria:
      - Клик по дню с данными открывает режим редактирования
      - Можно изменить значения и сохранить
      - Можно удалить запись за день
    depends_on:
      - task-003
    related_feature: Редактирование истории
    status: completed
    summary:
      "Реализовано редактирование и удаление записей из календаря. Клик по
      дню с данными открывает диалог с полями для звонков и чатов. Сохранение
      через PUT /api/counter, удаление через DELETE
      /api/counter?date=YYYY-MM-DD. Использован shadcn Dialog. Основная
      реализация: components/history-page.tsx, app/api/counter/route.ts,
      lib/models.ts. typecheck, lint, build — без ошибок."
  - id: task-005
    phase: mvp
    title: Навигация между вкладками «Счётчик» и «История»
    description: Добавить навигацию (табы) для переключения между страницами
      «Счётчик» и «История».
    priority: medium
    acceptance_criteria:
      - "Две вкладки для навигации: «Счётчик» и «История»"
      - Переключение между вкладками работает без перезагрузки страницы
    depends_on:
      - task-001
    related_feature: Учёт звонков и чатов
    status: completed
    summary: "Добавлены навигационные вкладки «Счётчик» и «История» в шапку
      приложения. Используется Next.js Link для клиентской навигации без
      перезагрузки страницы. Активная вкладка подсвечивается через
      usePathname(). Основная реализация: components/tab-navigation.tsx,
      app/layout.tsx. typecheck, lint, build — без ошибок."
  - id: task-006
    phase: mvp
    title: Исправить ошибку сохранения счётчика
    description:
      "При нажатии + или - на странице «Счётчик» появляется ошибка «Не
      удалось сохранить». Нужно исправить: клиент отправляет POST-запрос, а API
      ожидает PUT. Изменить метод запроса на PUT или добавить обработку POST в
      API."
    priority: high
    acceptance_criteria:
      - Нажатие + сохраняет значение без ошибки
      - Нажатие - сохраняет значение без ошибки
      - Значения корректно отображаются после перезагрузки
    depends_on: []
    related_feature: Учёт звонков и чатов
    status: completed
    summary:
      "Исправлена ошибка сохранения счётчика: в components/counter-page.tsx
      метод запроса изменён с POST на PUT, теперь клиент обращается к
      существующему эндпоинту PUT /api/counter. typecheck, lint, build — без
      ошибок."
  - id: task-007
    phase: mvp
    title: Редизайн в стиле Т-Банка
    description:
      "Переделать дизайн всего приложения в стиле Т-Банка: тёмная тема,
      жёлтый акцентный цвет (#FFDD2D), крупная типографика, плавные анимации,
