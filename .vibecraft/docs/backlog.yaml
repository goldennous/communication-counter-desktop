  - id: task-017
    phase: support
    title: Исправить ошибку гидратации ThemeToggle
    description:
      'В консоли ошибка гидратации: сервер рендерит aria-label="Включить
      светлую тему", а клиент — "Включить тёмную тему". Это из-за того, что
