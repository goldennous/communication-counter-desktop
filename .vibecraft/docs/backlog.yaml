      шапку приложения на всех страницах. Тема сохраняется в localStorage.
      typecheck, lint, build — без ошибок.
  - id: task-010
    phase: mvp
    title: Заменить итоги недели на декады и обновить блок месяца
    description:
      "В блоке итогов на странице «Счётчик» заменить раздел «Неделя» на
      «Декады» с тремя периодами: 1–10, 11–20, 21–N (N — последний день месяца).
      В каждом периоде показывать общее количество коммуникаций (звонки+чаты) с
      цветовой индикацией: 0–300 красный, 301–454 жёлтый, 455+ зелёный. В блоке
      «Месяц» добавить строку с процентом звонков от общего числа коммуникаций с
      цветовой индикацией: 0–29,99% красный, 30–39,99% жёлтый, 40%+ зелёный."
    priority: high
    acceptance_criteria:
      - Блок «Неделя» заменён на «Декады»
      - "Три периода: 1–10, 11–20, 21–N"
      - В каждом периоде показано общее количество коммуникаций
      - "Цветовая индикация: 0–300 красный, 301–454 жёлтый, 455+ зелёный"
      - В блоке «Месяц» добавлен процент звонков
      - "Цветовая индикация процента: 0–29,99% красный, 30–39,99% жёлтый, 40%+
        зелёный"
    depends_on: []
    related_feature: Статистика и итоги
    status: completed
    summary: "Блок «Неделя» заменён на «Декады» с тремя периодами: 1–10, 11–20,
      21–N. В каждом периоде отображается общее количество коммуникаций с
      цветовой индикацией (0–300 красный, 301–454 жёлтый, 455+ зелёный). В блоке
      «Месяц» добавлена строка с процентом звонков с цветовой индикацией
      (0–29,99% красный, 30–39,99% жёлтый, 40%+ зелёный). Основная реализация:
      components/counter-page.tsx. typecheck, lint, build — без ошибок."
  - id: task-011
    phase: mvp
    title: Заменить формальные глаголы на дружеские
    description:
