    priority: high
    acceptance_criteria:
      - Нажатие + мгновенно увеличивает значение на 1
      - Нажатие - мгновенно уменьшает значение на 1
      - Нет всплывающих уведомлений о сохранении
      - Страница не перезагружается
    depends_on: []
    related_feature: Учёт звонков и чатов
    status: completed
    summary: Удалены всплывающие уведомления (toast) при сохранении счётчика в
      components/counter-page.tsx. Значение обновляется мгновенно через
      optimistic update, сохранение происходит в фоне без блокировки кнопок
      (+/-). typecheck, lint, build — без ошибок.
  - id: task-009
    phase: mvp
    title: Тумблер переключения темы светлая/тёмная
    description: Добавить тумблер (переключатель) для смены темы между светлой и
      тёмной. Тумблер должен быть заметным и удобным.
    priority: medium
    acceptance_criteria:
      - Тумблер отображается на всех страницах
      - Переключение между светлой и тёмной темой работает
      - Выбранная тема сохраняется
    depends_on: []
    related_feature: Учёт звонков и чатов
    status: completed
    summary: Добавлен тумблер переключения светлой/тёмной темы. Использован
