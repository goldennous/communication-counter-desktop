      Фиксируйте→Фиксируй, Смотрите→Смотри (app/page.tsx), Нажмите→Нажми
      (components/counter-page.tsx), Просматривайте→Просматривай, Нажмите→Нажми,
      Измените/удалите→Измени/удали (components/history-page.tsx),
      Создайте→Создай, Добавьте→Добавь (components/service-catalog.tsx),
      Удалите→Удали, реализуете→реализуешь, ваш→свой (app/demo/page.tsx).
      typecheck, lint, build — без ошибок."
  - id: task-012
    phase: mvp
    title: Исправить сохранение счётчика на правильную дату
    description: При добавлении значений через + на странице «Счётчик» данные
      сохраняются на вчерашний день вместо сегодняшнего. Нужно исправить
      определение текущей даты, чтобы значения сохранялись на правильный день.
    priority: high
    acceptance_criteria:
      - Значения сохраняются на текущий день, а не на вчерашний
      - В истории данные отображаются под правильной датой
    depends_on: []
    related_feature: Учёт звонков и чатов
    status: completed
    summary: "Исправлено определение текущей даты в components/counter-page.tsx:
      todayStr() теперь использует локальные методы getFullYear/getMonth/getDate
      вместо toISOString(), который возвращал UTC-дату. Для пользователей в
      часовых поясах восточнее UTC это приводило к сохранению на вчерашний день.
      Также исправлены getLastDayOfMonth() и computeDecades() — они смешивали
      UTC и локальное время. typecheck, lint, build — без ошибок."
  - id: task-013
    phase: mvp
    title: Убрать перезагрузку всех элементов при изменении счётчика
    description:
      При нажатии + или - все элементы на странице «Счётчик» пропадают и
      появляются с анимацией, как будто страница загружается заново. Нужно,
      чтобы при изменении значений обновлялось только значение счётчика, без
      перезагрузки остальных блоков (итогов, заголовков и т.д.).
    priority: high
    acceptance_criteria:
      - При нажатии + или - меняется только цифра счётчика
      - Остальные элементы страницы не перезагружаются и не анимируются заново
    depends_on: []
    related_feature: Учёт звонков и чатов
    status: completed
    summary: "Исправлена перезагрузка всех элементов на странице «Счётчик» при
      нажатии +/—. Причина: updateCounter вызывал fetchAll(), который
      устанавливал loading=true, из-за чего весь UI перерисовывался с нуля.
      Вместо этого после сохранения вызывается refreshMonthData() — обновление
      только данных месяца без флага загрузки. Значение счётчика меняется
      мгновенно через optimistic update. Основная реализация:
      components/counter-page.tsx. typecheck, lint, build — без ошибок."
