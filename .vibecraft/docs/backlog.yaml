    status: completed
    summary:
      "Исправлена ошибка гидратации ThemeToggle. Добавлено состояние mounted:
      при SSR рендерится статическая заглушка, после гидратации — полноценный
      тумблер. typecheck, lint, build — без ошибок. Основная реализация:
